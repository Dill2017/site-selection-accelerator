[project]
name = "site-selection"
dynamic = ["version"]
description = "Brand Site Selection Accelerator — find whitespace opportunities using geospatial embeddings"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.119.0",
    "pydantic-settings>=2.11.0",
    "uvicorn>=0.37.0",
    "databricks-sdk>=0.74.0",
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "h3>=4.0.0",
    "scikit-learn>=1.3.0",
    "geopandas>=0.14.0",
    "shapely>=2.0.0",
    "srai[torch]>=0.8.0",
    "geopy>=2.4.0",
    "python-dotenv>=1.0.0",
    "rasterio>=1.3.0",
    "h3ronpy>=0.22.0",
]

[dependency-groups]
dev = [
    "ty>=0.0.12",
]

[tool.apx.metadata]
app-name = "site-selection"
app-slug = "site_selection"
app-entrypoint = "site_selection.backend.app:app"
api-prefix = "/api"
metadata-path = "src/site_selection/_metadata.py"

[tool.apx.ui]
root = "src/site_selection/ui"

[tool.apx.ui.registries]
"@animate-ui" = "https://animate-ui.com/r/{name}.json"
"@ai-elements" = "https://registry.ai-sdk.dev/{name}.json"
"@svgl" = "https://svgl.app/r/{name}.json"

[tool.ty.environment]
extra-paths = ["../../src/app"]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning>=0.7.0"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
fallback-version = "0.0.0"

[tool.hatch.build.hooks.version]
path = "src/site_selection/_version.py"
template = '''
version = "{version}"
'''

[tool.hatch.build]
artifacts = ["src/site_selection/__dist__", "src/site_selection/_metadata.py"]
exclude = ["src/site_selection/ui"]

[tool.hatch.build.targets.wheel.force-include]
"../../src/app" = "site_selection/_legacy"
