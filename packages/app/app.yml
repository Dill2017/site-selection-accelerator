command: ["uvicorn", "site_selection.backend.app:app", "--workers", "1"]

env:
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: RADIANCE_JOB_ID
    valueFrom: radiance-job
  - name: ETL_JOB_ID
    valueFrom: etl-job
  # IMPORTANT: these must match the catalog and schema in databricks.yml
  - name: GOLD_CATALOG
    value: "CHANGE_ME"
  - name: GOLD_SCHEMA
    value: "CHANGE_ME"
  - name: GENIE_SPACE_ID
    value: ""
