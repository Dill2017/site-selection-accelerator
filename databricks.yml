bundle:
  name: site-selection-accelerator

include:
  - resources/*.yml

sync:
  include:
    - packages/app/.build

variables:
  catalog:
    description: >
      Unity Catalog catalog for all gold tables, analysis tables, and the
      Hex2Vec model volume.  Must already exist; the ETL job creates the
      schema inside it.
    default: "beatrice_liew"
  schema:
    description: "Schema inside the catalog (created by the ETL job)."
    default: "geospatial"
  warehouse_id:
    description: >
      SQL Warehouse used by the ETL job and the running app.
      Looked up by display name — change to match your warehouse.
    lookup:
      warehouse: "Shared Unity Catalog Serverless"
  node_type_id:
    description: >
      Single-node cluster instance type for the Hex2Vec training task.
      Cloud-specific — pick the right one for your workspace:
        AWS:   i3.xlarge
        Azure: Standard_DS3_v2
        GCP:   n1-standard-4
    default: ""
  carto_divisions_catalog:
    description: >
      CARTO Overture Maps Divisions catalog (install from Databricks Marketplace).
      Default: carto_overture_maps_divisions
    default: "carto_overture_maps_divisions"
  carto_places_catalog:
    description: >
      CARTO Overture Maps Places catalog (install from Databricks Marketplace).
      Default: carto_overture_maps_places
    default: "carto_overture_maps_places"
  carto_buildings_catalog:
    description: >
      CARTO Overture Maps Buildings catalog (install from Databricks Marketplace).
      Default: carto_overture_maps_buildings
    default: "carto_overture_maps_buildings"

targets:
  dev:
    default: true
    mode: development
  prod:
    mode: production
