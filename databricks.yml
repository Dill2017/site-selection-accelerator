bundle:
  name: site-selection-accelerator

include:
  - resources/*.yml

sync:
  include:
    - packages/app/.build

variables:
  catalog:
    default: "dilshad_shawki"
  schema:
    default: "geospatial"
  warehouse_id:
    lookup:
      warehouse: "Shared Endpoint"

targets:
  dev:
    default: true
    mode: development
  prod:
    mode: production
