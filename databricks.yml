bundle:
  name: site-selection-accelerator

include:
  - resources/*.yml

sync:
  include:
    - packages/app/.build

variables:
  catalog:
    default: "beatrice_liew"
  schema:
    default: "geospatial"
  warehouse_id:
    lookup:
      warehouse: "Shared Unity Catalog Serverless"
  node_type_id:
    description: "Single-node cluster instance type (cloud-specific)"
    default: "i3.xlarge"

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: e2-demo-west
  prod:
    mode: production
