resources:
  apps:
    site_selection_app:
      name: "site-selection-accelerator"
      description: "Brand Site Selection Accelerator — find whitespace opportunities using geospatial embeddings"
      source_code_path: ../packages/app/.build
      resources:
        - name: "sql-warehouse"
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: "CAN_USE"
        - name: "radiance-job"
          job:
            id: ${resources.jobs.radiance_on_demand.id}
            permission: "CAN_MANAGE_RUN"
        - name: "etl-job"
          job:
            id: ${resources.jobs.geospatial_etl_job.id}
            permission: "CAN_VIEW"
