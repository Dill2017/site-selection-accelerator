resources:
  jobs:
    geospatial_etl_job:
      name: "[${bundle.target}] Site Selection - Refresh Geospatial Data"
      tasks:
        - task_key: "setup_schema"
          notebook_task:
            notebook_path: ../src/pipeline/transformations/setup_schema.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
        - task_key: "create_gold_cities"
          depends_on:
            - task_key: "setup_schema"
          notebook_task:
            notebook_path: ../src/pipeline/transformations/gold_cities.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              carto_divisions_catalog: ${var.carto_divisions_catalog}
        - task_key: "create_gold_places"
          depends_on:
            - task_key: "setup_schema"
          notebook_task:
            notebook_path: ../src/pipeline/transformations/gold_places.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              carto_places_catalog: ${var.carto_places_catalog}
        - task_key: "create_gold_buildings"
          depends_on:
            - task_key: "setup_schema"
          notebook_task:
            notebook_path: ../src/pipeline/transformations/gold_buildings.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              carto_buildings_catalog: ${var.carto_buildings_catalog}
        - task_key: "create_gold_places_enriched"
          depends_on:
            - task_key: "setup_schema"
          notebook_task:
            notebook_path: ../src/pipeline/transformations/gold_places_enriched.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              carto_places_catalog: ${var.carto_places_catalog}
        - task_key: "create_analysis_tables"
          depends_on:
            - task_key: "setup_schema"
          notebook_task:
            notebook_path: ../src/pipeline/transformations/analysis_tables.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
        - task_key: "create_gold_radiance"
          depends_on:
            - task_key: "create_gold_cities"
          notebook_task:
            notebook_path: ../src/pipeline/transformations/create_gold_radiance.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
              viirs_volume_name: ${var.viirs_volume_name}
          libraries:
            - pypi:
                package: "databricks-sdk>=0.65.0"
            - pypi:
                package: "rasterio>=1.3.0,<1.5"
            - pypi:
                package: "h3ronpy>=0.22.0"
            - pypi:
                package: "geopandas"
          job_cluster_key: "single_node"
        - task_key: "setup_genie_space"
          depends_on:
            - task_key: "create_gold_places_enriched"
            - task_key: "create_gold_cities"
            - task_key: "create_gold_buildings"
            - task_key: "create_analysis_tables"
            - task_key: "create_gold_radiance"
          notebook_task:
            notebook_path: ../src/pipeline/setup_genie_space.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
          environment_key: "genie_setup"
        - task_key: "train_hex2vec"
          depends_on:
            - task_key: "create_gold_cities"
            - task_key: "create_gold_places"
            - task_key: "create_gold_buildings"
          notebook_task:
            notebook_path: ../src/pipeline/train_hex2vec.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
          libraries:
            - pypi:
                package: "databricks-sdk>=0.65.0"
            - pypi:
                package: "srai[torch]>=0.8.0"
            - pypi:
                package: "geopandas"
            - pypi:
                package: "h3>=4"
            - pypi:
                package: "shapely"
          job_cluster_key: "single_node"
      job_clusters:
        - job_cluster_key: "single_node"
          new_cluster:
            spark_version: "16.4.x-scala2.12"
            node_type_id: ${var.node_type_id}
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: SingleNode
      environments:
        - environment_key: "genie_setup"
          spec:
            client: "1"
            dependencies:
              - "databricks-sdk>=0.65.0"
