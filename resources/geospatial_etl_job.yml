resources:
  jobs:
    geospatial_etl_job:
      name: "[${bundle.target}] Site Selection - Refresh Geospatial Data"
      tasks:
        - task_key: "setup_schema"
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../src/pipeline/transformations/setup_schema.sql
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
        - task_key: "create_gold_cities"
          depends_on:
            - task_key: "setup_schema"
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../src/pipeline/transformations/gold_cities.sql
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              carto_divisions_catalog: ${var.carto_divisions_catalog}
        - task_key: "create_gold_places"
          depends_on:
            - task_key: "setup_schema"
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../src/pipeline/transformations/gold_places.sql
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              carto_places_catalog: ${var.carto_places_catalog}
        - task_key: "create_gold_buildings"
          depends_on:
            - task_key: "setup_schema"
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../src/pipeline/transformations/gold_buildings.sql
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              carto_buildings_catalog: ${var.carto_buildings_catalog}
        - task_key: "create_gold_places_enriched"
          depends_on:
            - task_key: "setup_schema"
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../src/pipeline/transformations/gold_places_enriched.sql
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              carto_places_catalog: ${var.carto_places_catalog}
        - task_key: "create_analysis_tables"
          depends_on:
            - task_key: "setup_schema"
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../src/pipeline/transformations/analysis_tables.sql
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
        - task_key: "create_gold_radiance"
          depends_on:
            - task_key: "create_gold_cities"
          spark_python_task:
            python_file: ../src/pipeline/transformations/create_gold_radiance.py
            parameters:
              - "${var.catalog}"
              - "${var.schema}"
              - "${var.warehouse_id}"
          libraries:
            - pypi:
                package: "databricks-sdk>=0.65.0"
            - pypi:
                package: "rasterio>=1.3.0,<1.5"
            - pypi:
                package: "h3ronpy>=0.22.0"
            - pypi:
                package: "geopandas"
          job_cluster_key: "single_node"
        - task_key: "setup_genie_space"
          depends_on:
            - task_key: "create_gold_places_enriched"
            - task_key: "create_gold_cities"
            - task_key: "create_gold_buildings"
            - task_key: "create_analysis_tables"
          spark_python_task:
            python_file: ../src/pipeline/setup_genie_space.py
            parameters:
              - "${var.catalog}"
              - "${var.schema}"
              - "${var.warehouse_id}"
          environment_key: "genie_setup"
        - task_key: "train_hex2vec"
          depends_on:
            - task_key: "create_gold_cities"
            - task_key: "create_gold_places"
            - task_key: "create_gold_buildings"
          spark_python_task:
            python_file: ../src/pipeline/train_hex2vec.py
            parameters:
              - "${var.catalog}"
              - "${var.schema}"
              - "${var.warehouse_id}"
          libraries:
            - pypi:
                package: "databricks-sdk>=0.65.0"
            - pypi:
                package: "srai[torch]>=0.8.0"
            - pypi:
                package: "geopandas"
            - pypi:
                package: "h3>=4"
            - pypi:
                package: "shapely"
          job_cluster_key: "single_node"
      job_clusters:
        - job_cluster_key: "single_node"
          new_cluster:
            spark_version: "16.4.x-scala2.12"
            node_type_id: ${var.node_type_id}
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: SingleNode
      environments:
        - environment_key: "genie_setup"
          spec:
            client: "1"
            dependencies:
              - "databricks-sdk>=0.65.0"
