resources:
  jobs:
    radiance_on_demand:
      name: "[${bundle.target}] Site Selection - On-Demand Radiance"
      parameters:
        - name: country
          default: ""
        - name: city
          default: ""
        - name: resolution
          default: "9"
      tasks:
        - task_key: "compute_radiance"
          notebook_task:
            notebook_path: ../src/pipeline/transformations/compute_city_radiance.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
              country: "{{job.parameters.country}}"
              city: "{{job.parameters.city}}"
              resolution: "{{job.parameters.resolution}}"
              viirs_volume_name: ${var.viirs_volume_name}
          environment_key: "radiance_serverless"
      environments:
        - environment_key: "radiance_serverless"
          spec:
            client: "5"
            dependencies:
              - "databricks-sdk>=0.65.0"
              - "rasterio"
              - "h3ronpy"
              - "geopandas"
